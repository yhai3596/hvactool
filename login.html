<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录 · HVAC 工具站</title>
<link rel="stylesheet" href="css/style.css?v=216">
<link rel="stylesheet" href="css/site.css?v=216">
</head>
<body data-page="login" class="tool-page">
<div id="app">
  <div class="auth-box panel">
    <div class="panel-body">
      <h2 data-i18n="login_h2" style="text-align:center;margin:8px 0 18px;letter-spacing:4px;color:#7dd3fc">HVAC 工具站</h2>
      <div class="auth-tabs">
        <button id="tabLogin" class="on" data-i18n="tab_login">登 录</button>
        <button id="tabReg" data-i18n="tab_reg">注 册</button>
      </div>
      <div class="form-grid cols1">
        <div class="field" id="inviteRow" style="display:none"><label data-i18n="f_invite">邀请码</label><input id="invite" type="text" data-i18n-ph="ph_invite" placeholder="注册需要邀请码" autocomplete="off" style="text-transform:uppercase;letter-spacing:2px"></div>
        <div class="field"><label data-i18n="f_email">邮箱</label><input id="email" type="email" data-i18n-ph="ph_email" placeholder="you@example.com" autocomplete="username"></div>
        <div class="field"><label data-i18n="f_pwd">密码</label><input id="pwd" type="password" data-i18n-ph="ph_pwd" placeholder="至少 6 位" autocomplete="current-password"></div>
        <div class="field" id="pwd2Row" style="display:none"><label data-i18n="f_pwd2">确认密码</label><input id="pwd2" type="password"></div>
      </div>
      <div class="btn-row"><button class="btn" id="goBtn" data-i18n="btn_login" style="flex:1">登 录</button></div>
      <div class="auth-msg" id="msg"></div>
      <div class="note" data-i18n="login_note">本站为邀请制，注册需要邀请码。账号由 Supabase 云端托管、密码加密存储，注册成功即可直接登录。注册后你将获得 5 个邀请码，可在导航栏「邀请码」中查看并分享。</div>
    </div>
  </div>
</div>
<script src="js/lib/config.js?v=216"></script>
<script src="js/lib/i18n.js?v=216"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/lib/shell.js?v=216"></script>
<script>
let mode = 'login';
const $ = id => document.getElementById(id);
const next = new URLSearchParams(location.search).get('next') || 'index.html';

function setMode(m) {
  mode = m;
  $('tabLogin').classList.toggle('on', m === 'login');
  $('tabReg').classList.toggle('on', m === 'reg');
  $('pwd2Row').style.display = m === 'reg' ? '' : 'none';
  $('inviteRow').style.display = m === 'reg' ? '' : 'none';
  $('goBtn').textContent = m === 'login' ? T('btn_login') : T('btn_reg');
  $('msg').textContent = '';
}
$('tabLogin').onclick = () => setMode('login');
$('tabReg').onclick = () => setMode('reg');

function say(t, color) { const m = $('msg'); m.textContent = t; m.style.color = color || '#6ee7b7'; }

$('goBtn').onclick = async () => {
  if (!window.supabase) return say(T('msg_no_auth'), '#fb7185');
  if (!sbClient) sbClient = window.supabase.createClient(SITE_CONFIG.SUPABASE_URL, SITE_CONFIG.SUPABASE_KEY);
  const email = $('email').value.trim(), pwd = $('pwd').value;
  if (!email || pwd.length < 6) return say(T('msg_need_login'), '#fbbf24');
  $('goBtn').disabled = true;
  try {
    if (mode === 'reg') {
      if (pwd !== $('pwd2').value) { say(T('msg_pwd_mismatch'), '#fbbf24'); return; }
      const code = $('invite').value.trim().toUpperCase();
      if (!code) { say(T('msg_need_invite'), '#fbbf24'); return; }
      // 走 Edge Function：校验邀请码 → 建号（免邮件确认）→ 消费码 + 发 5 个新码
      const { data, error } = await sbClient.functions.invoke('register-with-invite', { body: { code, email, password: pwd } });
      let errMsg = null;
      if (error) {
        errMsg = T('msg_reg_fail');
        try { const ctx = await error.context.json(); if (ctx && ctx.error) errMsg = ctx.error; } catch (_) {}
      } else if (data && data.error) {
        errMsg = data.error;
      }
      if (errMsg) { say(errMsg, '#fb7185'); return; }
      // 注册成功 → 自动登录进站
      say(T('msg_reg_ok'));
      const { error: e2 } = await sbClient.auth.signInWithPassword({ email, password: pwd });
      if (e2) { say(T('msg_reg_login_hint'), '#6ee7b7'); setMode('login'); return; }
      setTimeout(() => location.href = next, 600);
    } else {
      const { error } = await sbClient.auth.signInWithPassword({ email, password: pwd });
      if (error) throw error;
      say(T('msg_login_ok'));
      setTimeout(() => location.href = next, 400);
    }
  } catch (e) {
    const t = String(e.message || e);
    if (/Invalid login credentials/i.test(t)) say(T('msg_bad_cred'), '#fb7185');
    else if (/Email not confirmed/i.test(t)) say(T('msg_not_confirmed'), '#fbbf24');
    else if (/rate limit/i.test(t)) say(T('msg_rate'), '#fbbf24');
    else say('· ' + t, '#fb7185');
  } finally {
    $('goBtn').disabled = false;
  }
};
$('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') $('goBtn').click(); });
</script>
</body>
</html>
