<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>登录 · HVAC 工具站</title>
<link rel="stylesheet" href="css/style.css?v=215">
<link rel="stylesheet" href="css/site.css?v=215">
</head>
<body data-page="login" class="tool-page">
<div id="app">
  <div class="auth-box panel">
    <div class="panel-body">
      <h2 style="text-align:center;margin:8px 0 18px;letter-spacing:4px;color:#7dd3fc">HVAC 工具站</h2>
      <div class="auth-tabs">
        <button id="tabLogin" class="on">登 录</button>
        <button id="tabReg">注 册</button>
      </div>
      <div class="form-grid cols1">
        <div class="field"><label>邮箱</label><input id="email" type="email" placeholder="you@example.com" autocomplete="username"></div>
        <div class="field"><label>密码</label><input id="pwd" type="password" placeholder="至少 6 位" autocomplete="current-password"></div>
        <div class="field" id="pwd2Row" style="display:none"><label>确认密码</label><input id="pwd2" type="password"></div>
      </div>
      <div class="btn-row"><button class="btn" id="goBtn" style="flex:1">登 录</button></div>
      <div class="auth-msg" id="msg"></div>
      <div class="note">账号由 Supabase 云端托管，密码加密存储。注册后如收到确认邮件，请点击邮件内链接完成验证再登录。</div>
    </div>
  </div>
</div>
<script src="js/lib/config.js?v=215"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/lib/shell.js?v=215"></script>
<script>
let mode = 'login';
const $ = id => document.getElementById(id);
const next = new URLSearchParams(location.search).get('next') || 'index.html';

function setMode(m) {
  mode = m;
  $('tabLogin').classList.toggle('on', m === 'login');
  $('tabReg').classList.toggle('on', m === 'reg');
  $('pwd2Row').style.display = m === 'reg' ? '' : 'none';
  $('goBtn').textContent = m === 'login' ? '登 录' : '注 册';
  $('msg').textContent = '';
}
$('tabLogin').onclick = () => setMode('login');
$('tabReg').onclick = () => setMode('reg');

function say(t, color) { const m = $('msg'); m.textContent = t; m.style.color = color || '#6ee7b7'; }

$('goBtn').onclick = async () => {
  if (!window.supabase) return say('无法加载认证组件，请检查网络连接。', '#fb7185');
  if (!sbClient) sbClient = window.supabase.createClient(SITE_CONFIG.SUPABASE_URL, SITE_CONFIG.SUPABASE_KEY);
  const email = $('email').value.trim(), pwd = $('pwd').value;
  if (!email || pwd.length < 6) return say('请输入邮箱和至少 6 位的密码。', '#fbbf24');
  $('goBtn').disabled = true;
  try {
    if (mode === 'reg') {
      if (pwd !== $('pwd2').value) { say('两次密码不一致。', '#fbbf24'); return; }
      const { data, error } = await sbClient.auth.signUp({ email, password: pwd });
      if (error) throw error;
      if (data.user && data.user.identities && data.user.identities.length === 0) {
        say('该邮箱已注册，请直接登录。', '#fbbf24');
      } else if (data.session) {
        say('注册成功，正在进入…');
        setTimeout(() => location.href = next, 600);
      } else {
        say('注册成功！确认邮件已发送至 ' + email + '，请点击邮件内链接完成验证后回来登录。');
      }
    } else {
      const { error } = await sbClient.auth.signInWithPassword({ email, password: pwd });
      if (error) throw error;
      say('登录成功，正在进入…');
      setTimeout(() => location.href = next, 400);
    }
  } catch (e) {
    const t = String(e.message || e);
    if (/Invalid login credentials/i.test(t)) say('邮箱或密码错误。', '#fb7185');
    else if (/Email not confirmed/i.test(t)) say('邮箱尚未验证，请先点击确认邮件中的链接。', '#fbbf24');
    else if (/rate limit/i.test(t)) say('操作过于频繁，请稍后再试。', '#fbbf24');
    else say('失败：' + t, '#fb7185');
  } finally {
    $('goBtn').disabled = false;
  }
};
$('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') $('goBtn').click(); });
</script>
</body>
</html>
