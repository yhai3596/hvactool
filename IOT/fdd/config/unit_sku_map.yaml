# Unit -> SKU + data-type routing (FDD-I-012 #1). UPDATED WITH EACH DATA DELIVERY.
#
# data_type routes each unit's data:
#   healthy_baseline : enters the rating-anchor / envelope / sense baseline pool.
#   fault_injected   : EXCLUDED from the healthy baseline pool (its residuals are the
#                      signal to learn from, not a clean reference). Add injected units
#                      here as the refrigerant-undercharge gradient data arrives.
#
# Units present in delivered data but ABSENT here are reported UNMAPPED (c4 load attrs)
# and never dropped — add them here (with sku + data_type) to bring them in.
units:
  "37": {sku: EODA19H-2436AA, data_type: healthy_baseline}
  "44": {sku: EODA19H-4860AA, data_type: healthy_baseline}
  "84": {sku: EODA19H-2436AA, data_type: healthy_baseline}
  "85": {sku: EODA19H-4860AA, data_type: healthy_baseline}
  "31":
    sku: EODA19H-2436AA
    data_type: healthy_baseline
    # FDD-I-017 file-level routing (minimal relabel): FDD-I-014-audited 2023-12-09
    # 50%-undercharge runs. NO severity tier parsed this batch (undercharge naming
    # spec has three open confirmations: SKU coding / single-vs-multi tier per file /
    # legacy migration). Controlled fault-injection assets: rows still LOAD, routed
    # out of the healthy baseline pool by c4._apply_data_type_routing.
    file_data_type:
      RamChecker_20231209094220.csv: fault_injected
      RamChecker_20231209112220.csv: fault_injected
      RamChecker_20231209130220.csv: fault_injected
      RamChecker_20231209144220.csv: fault_injected
      RamChecker_20231209162220.csv: fault_injected
    # DK-016 (FDD-I-019-R1 ruling 1): trial-production unit 31 x condition-A cooling EEV
    # partial opening (Exv 286-316, 104 steady rows, 3 files) = unit-level anomaly.
    # QUARANTINE FLAG for every cooling-side reference pool / calibration statistic /
    # sh-sc baseline; rows are NOT deleted (kept loaded as the first real sample of the
    # exv-anomaly channel, DK-009-d). Mechanism question -> O-VENDOR (organizational).
    cooling_ref_quarantine:
      - {file: RamChecker_20231123172117.csv, test_condition: A}
      - {file: RamChecker_20231123205133.csv, test_condition: A}
      - {file: RamChecker_20231127105005.csv, test_condition: A}
  "55": {sku: EODA19H-2436AA, data_type: healthy_baseline}

# SKU nominal rated cooling capacity (kW): 2436AA = 3 ton, 4860AA = 5 ton.
sku_rated_kw:
  EODA19H-2436AA: 10.5
  EODA19H-4860AA: 17.6

# H4 proxy anchor: ANY healthy unit of this SKU with qualifying low-temp defrost-cycling
# frost-quasi-equilibrium segments (replaces the former single-unit source_unit=44).
h4_proxy_sku: EODA19H-4860AA
