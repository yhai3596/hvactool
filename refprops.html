<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1728">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title data-i18n="rp_pagetitle">冷媒物性查询 · HVAC 工具站</title>
<link rel="stylesheet" href="css/style.css?v=230">
<link rel="stylesheet" href="css/site.css?v=230">
</head>
<body data-page="refprops" data-units="1" class="tool-page">
<div id="app">
  <div class="tool-layout">
    <!-- 输入 -->
    <div class="panel">
      <div class="panel-title" data-i18n="rp_state">状态点查询 · STATE POINT</div>
      <div class="panel-body">
        <div class="form-grid">
          <div class="field"><label data-i18n="pc_f_fluid">冷媒</label><select id="fluid"></select></div>
          <div class="field"><label data-i18n="ps_combo_lbl">已知参数组合</label>
            <select id="pair">
              <option value="TP" data-i18n="rp_o_tp">温度 + 压力（单相区）</option>
              <option value="PQ" data-i18n="rp_o_pq">压力 + 干度（两相区）</option>
              <option value="TQ" data-i18n="rp_o_tq">温度 + 干度（两相区）</option>
              <option value="PH" data-i18n="rp_o_ph">压力 + 焓</option>
              <option value="PS" data-i18n="rp_o_ps">压力 + 熵</option>
            </select>
          </div>
          <div class="field"><label id="lbl1">—</label><input id="v1" type="number" step="any"></div>
          <div class="field"><label id="lbl2">—</label><input id="v2" type="number" step="any"></div>
        </div>
        <div class="btn-row">
          <button class="btn" id="calcBtn" data-i18n="rp_query">查 询</button>
          <span id="fluidInfo" style="font-size:11px;color:var(--text-faint);font-family:var(--mono)"></span>
        </div>
        <div class="note" data-i18n-html="rp_note">
          压力均为<b>绝对压力</b>；焓熵基准 IIR（0°C 饱和液 h=200 kJ/kg，s=1.0 kJ/(kg·K)），与常用物性表一致（美制表册基准不同，绝对值有系统差，差值不受影响）。<br>
          R410A / R407C / R404A / R454B 为混合冷媒，两相区存在温度滑移（泡点≠露点）。
        </div>
      </div>
    </div>

    <!-- 结果 -->
    <div class="panel">
      <div class="panel-title"><span data-i18n="pc_result">计算结果 · RESULT</span> <span style="color:#a78bfa;font-family:Consolas;font-size:10px">CoolProp</span></div>
      <div class="panel-body">
        <div id="resBanner" class="result-banner" style="display:none"></div>
        <div class="kv-grid" id="resGrid"></div>
        <div id="satBlock" style="margin-top:14px;display:none">
          <div style="font-size:11px;color:var(--accent);letter-spacing:2px;margin-bottom:8px" data-i18n="rp_sat_at_p">同压力饱和参数 · SATURATION @ P</div>
          <div class="kv-grid" id="satGrid"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- 饱和表 -->
  <div class="panel" style="margin-top:10px">
    <div class="panel-title" data-i18n="rp_sattable">饱和性质表 · SATURATION TABLE</div>
    <div class="panel-body">
      <div class="btn-row" style="margin-top:0">
        <div class="field-inline">
          <span style="font-size:12px;color:var(--text-dim)" data-i18n="rp_trange">温度范围</span>
          <input id="t1" data-uk="temp" type="number" value="-40" style="width:74px">
          <span style="color:var(--text-dim)">~</span>
          <input id="t2" data-uk="temp" type="number" value="65" style="width:74px">
          <span style="font-size:12px;color:var(--text-dim)"><span data-ul="temp"></span><span data-i18n="rp_step">，步长</span></span>
          <input id="dt" data-uk="dtemp" type="number" value="5" style="width:56px">
        </div>
        <button class="btn small" id="tblBtn" data-i18n="rp_gen_table">生成饱和表</button>
      </div>
      <div style="overflow-x:auto;margin-top:10px">
        <table class="data-table" id="satTable" style="display:none">
          <thead><tr id="satHead"></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="js/lib/config.js?v=230"></script>
<script src="js/lib/i18n.js?v=230"></script>
<script src="js/lib/units.js?v=230"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/lib/shell.js?v=230"></script>
<script src="js/lib/analytics.js?v=230"></script>
<script src="js/lib/api.js?v=230"></script>
<script>
const $ = id => document.getElementById(id);
const FLUIDS = ['R410A','R32','R454B','R134a','R290','R404A','R407C','R22','R1234yf','R600a','R717','R744'];
$('fluid').innerHTML = FLUIDS.map(f => `<option>${f}</option>`).join('');

/* pair 字母 → {label, kind}；kind=null 表示无量纲 */
const LETTER = {
  T: { k: 'rp_l_t', kind: 'temp' },
  P: { k: 'rp_l_p', kind: 'press' },
  Q: { k: 'rp_l_q', kind: null },
  H: { k: 'rp_l_h', kind: 'h' },
  S: { k: 'rp_l_s', kind: 's' },
};
const PAIR_DEF = { TP: [10, 1000], PQ: [1000, 0.5], TQ: [10, 0.5], PH: [1000, 420], PS: [1000, 1.8] };
const IP_CONV = { temp: v => v * 1.8 + 32, press: v => v * 0.1450377377, h: v => v * 0.4299226, s: v => v * 0.2388459 };
/* 后端返回的中文相态/提示 → i18n（前端映射，避免改后端需重启） */
const PHASE_MAP = { '超临界': 'rp_ph_supercrit', '两相（湿蒸气）': 'rp_ph_twophase', '过热蒸气': 'rp_ph_superheat', '过冷液体': 'rp_ph_subcool' };
const HINT_MAP = { '该温压组合位于两相区，温度与压力不独立；请改用 压力+干度 或 温度+干度 查询。': 'rp_hint_ambig' };
const trPhase = p => PHASE_MAP[p] ? window.T(PHASE_MAP[p]) : (p || '');
const trHint = h => HINT_MAP[h] ? window.T(HINT_MAP[h]) : (h || '');

function setupPair() {
  const pair = $('pair').value;
  [...pair].forEach((letter, i) => {
    const def = LETTER[letter];
    $('lbl' + (i + 1)).innerHTML = def.kind ? `<span>${window.T(def.k)}</span>（<span data-ul="${def.kind}"></span>）` : window.T(def.k);
    const el = $('v' + (i + 1));
    let v = PAIR_DEF[pair][i];
    if (def.kind && Units.sysIn === 'ip') v = Units.nice(IP_CONV[def.kind](v));
    el.value = v;
    if (def.kind) el.dataset.uk = def.kind; else delete el.dataset.uk;
  });
  Units.relabel();
}
$('pair').onchange = setupPair;

async function loadInfo() {
  try {
    const j = await api('/api/fluidinfo', { fluid: $('fluid').value });
    $('fluidInfo').textContent =
      `Tc ${fmtN(Units.val('temp', j.t_crit),1)}${Units.u('temp')} · Pc ${fmtN(Units.val('press', j.p_crit),0)}${Units.u('press')} · M ${fmtN(j.molar_mass,1)}g/mol` +
      (j.glide_blend ? window.T('rp_blend') : '');
  } catch (e) { $('fluidInfo').textContent = ''; }
}
$('fluid').onchange = loadInfo;

const kv = (k, v, u, cls) => `<div class="kv ${cls||''}"><div class="k">${k}</div><div class="v">${v}<small>${u||''}</small></div></div>`;
const V = (kind, siv, d = 2) => fmtN(Units.val(kind, siv), d);

let lastState = null, lastTable = null;

$('calcBtn').onclick = async () => {
  const pair = $('pair').value;
  try {
    const vals = [1, 2].map(i => {
      const def = LETTER[pair[i - 1]];
      const raw = parseFloat($('v' + i).value);
      return def.kind ? Units.toSI(def.kind, raw) : raw;
    });
    const j = await api('/api/props', { fluid: $('fluid').value, pair, v1: vals[0], v2: vals[1] });
    lastState = j;
    renderState();
  } catch (e) { toast(e.message, true); }
};

function renderState() {
  const j = lastState;
  if (!j) return;
  const banner = $('resBanner');
  banner.style.display = '';
  if (j.two_phase_ambiguous) {
    banner.className = 'result-banner warn';
    banner.textContent = '⚠ ' + trHint(j.hint);
    $('resGrid').innerHTML = '';
    renderSat(j.sat);
    return;
  }
  banner.className = 'result-banner';
  const T = window.T;
  let extra = '';
  if (j.superheat !== undefined) extra = `${T('rp_superheat')}${V('dtemp', j.superheat)} ${Units.u('dtemp')}`;
  if (j.subcool !== undefined) extra = `${T('rp_subcool')}${V('dtemp', j.subcool)} ${Units.u('dtemp')}`;
  if (j.quality !== null && j.quality !== undefined) extra = `${T('rp_quality')}${fmtN(j.quality,4)}`;
  banner.textContent = `${T('rp_phase')}${trPhase(j.phase)}${extra}`;

  $('resGrid').innerHTML =
    kv(T('rp_r_t'), V('temp', j.T), Units.u('temp')) +
    kv(T('rp_r_p'), V('press', j.P, 1), Units.u('press')) +
    kv(T('ps_r_h'), V('h', j.h), Units.u('h'), 'hl') +
    kv(T('rp_r_s'), V('s', j.s, 4), Units.u('s'), 'hl') +
    kv(T('rp_r_rho'), V('rho', j.rho), Units.u('rho')) +
    kv(T('ps_r_v'), j.v ? Units.val('vspec', j.v).toExponential(3) : '—', Units.u('vspec')) +
    (j.quality !== null && j.quality !== undefined ? kv(T('rp_r_q'), fmtN(j.quality,4), '-', 'warn') : '') +
    kv(T('rp_r_cp'), V('s', j.cp, 3), Units.u('s')) +
    kv(T('rp_r_cv'), V('s', j.cv, 3), Units.u('s')) +
    kv(T('rp_r_mu'), fmtN(j.mu, 2), 'µPa·s') +
    kv(T('rp_r_k'), fmtN(j.k, 2), 'mW/m·K');
  renderSat(j.sat_at_p);
}

function renderSat(s) {
  if (!s) { $('satBlock').style.display = 'none'; return; }
  $('satBlock').style.display = '';
  const T = window.T;
  $('satGrid').innerHTML =
    kv(T('rp_s_tbub'), V('temp', s.t_bubble), Units.u('temp')) +
    kv(T('rp_s_tdew'), V('temp', s.t_dew), Units.u('temp')) +
    (s.glide > 0.05 ? kv(T('rp_s_glide'), V('dtemp', s.glide), Units.u('dtemp'), 'warn') : '') +
    kv(T('rp_s_hf'), V('h', s.hf), Units.u('h')) +
    kv(T('rp_s_hg'), V('h', s.hg), Units.u('h')) +
    kv(T('rp_s_latent'), V('h', s.latent), Units.u('h'), 'hl') +
    kv(T('rp_s_rhof'), V('rho', s.rhof, 1), Units.u('rho')) +
    kv(T('rp_s_rhog'), V('rho', s.rhog), Units.u('rho'));
}

$('tblBtn').onclick = async () => {
  try {
    const j = await api('/api/sattable', {
      fluid: $('fluid').value,
      t1: Units.toSI('temp', parseFloat($('t1').value)),
      t2: Units.toSI('temp', parseFloat($('t2').value)),
      dt: Units.toSI('dtemp', parseFloat($('dt').value)) || 5,
    });
    lastTable = j;
    renderTable();
  } catch (e) { toast(e.message, true); }
};

function renderTable() {
  if (!lastTable) return;
  const T = window.T;
  $('satHead').innerHTML =
    `<th>${T('rp_th_t')} ${Units.u('temp')}</th><th>${T('rp_th_pbub')} ${Units.u('press')}</th><th>${T('rp_th_pdew')} ${Units.u('press')}</th>` +
    `<th>${T('rp_th_hf')} ${Units.u('h')}</th><th>${T('rp_th_hg')} ${Units.u('h')}</th><th>${T('rp_th_latent')} ${Units.u('h')}</th>` +
    `<th>s′ ${Units.u('s')}</th><th>s″ ${Units.u('s')}</th>` +
    `<th>ρ′ ${Units.u('rho')}</th><th>ρ″ ${Units.u('rho')}</th>`;
  $('satTable').querySelector('tbody').innerHTML = lastTable.rows.map(r =>
    `<tr><td>${V('temp', r.t, 1)}</td><td>${V('press', r.p_bubble, 1)}</td><td>${V('press', r.p_dew, 1)}</td>
     <td>${V('h', r.hf)}</td><td>${V('h', r.hg)}</td><td>${V('h', r.latent)}</td>
     <td>${V('s', r.sf, 4)}</td><td>${V('s', r.sg, 4)}</td>
     <td>${V('rho', r.rhof, 1)}</td><td>${V('rho', r.rhog)}</td></tr>`).join('');
  $('satTable').style.display = '';
}

Units.onOut(() => { renderState(); renderTable(); loadInfo(); });

document.addEventListener('DOMContentLoaded', () => {
  setupPair();
  loadInfo();
});
</script>
</body>
</html>
