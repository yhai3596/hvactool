<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1728">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>后台管理 · HVAC Admin</title>
<link rel="stylesheet" href="css/style.css?v=228">
<link rel="stylesheet" href="css/site.css?v=228">
<style>
  .admin-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .admin-tabs button { background: var(--panel); border: 1px solid var(--panel-border); color: var(--text-dim); border-radius: 6px; padding: 7px 16px; cursor: pointer; font-size: 13px; }
  .admin-tabs button.on { background: var(--accent); color: var(--bg); font-weight: 700; border-color: var(--accent); }
  .admin-pane { display: none; }
  .admin-pane.on { display: block; }
  .admin-cell-inline { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .admin-cell-inline input { width: 66px; }
  .mini { font-size: 11px; padding: 3px 8px; }
  #adminMsg { position: fixed; left: 50%; bottom: 26px; transform: translateX(-50%); background: var(--panel); border: 1px solid var(--accent); color: var(--text); padding: 9px 16px; border-radius: 8px; font-size: 13px; display: none; z-index: 9999; max-width: 80vw; }
</style>
</head>
<body data-page="admin" class="tool-page">
<div id="app">
  <div id="adminGuard" class="panel" style="display:none"><div class="panel-body" style="text-align:center;padding:40px;color:var(--text-dim)" id="guardMsg">…</div></div>

  <div id="adminMain" style="display:none">
    <div class="admin-tabs" id="adminTabs"></div>

    <!-- 用户 -->
    <div class="admin-pane on" id="pane-users">
      <div class="panel"><div class="panel-title" id="t_users_title">用户管理</div>
        <div class="panel-body">
          <div class="btn-row" style="margin-top:0"><button class="btn small" id="reloadUsers">↻ <span id="t_refresh">刷新</span></button></div>
          <div style="overflow-x:auto;margin-top:10px">
            <table class="data-table" id="usersTable"><thead><tr id="usersHead"></tr></thead><tbody></tbody></table>
          </div>
        </div>
      </div>
    </div>

    <!-- 建号 -->
    <div class="admin-pane" id="pane-create">
      <div class="panel"><div class="panel-title" id="t_create_title">新增账号</div>
        <div class="panel-body">
          <div class="form-grid cols3" style="max-width:820px">
            <div class="field"><label id="t_c_email">邮箱</label><input id="c_email" type="email" placeholder="user@example.com"></div>
            <div class="field"><label id="t_c_pwd">密码（≥6）</label><input id="c_pwd" type="text" placeholder="≥ 6"></div>
            <div class="field"><label id="t_c_credits">初始积分</label><input id="c_credits" type="number" value="1000"></div>
            <div class="field"><label id="t_c_invites">邀请码数</label><input id="c_invites" type="number" value="5"></div>
          </div>
          <div class="btn-row"><button class="btn" id="createBtn" data-def="1">创建账号</button></div>
          <div class="kv-grid" id="createOut" style="margin-top:12px"></div>
        </div>
      </div>
    </div>

    <!-- 埋点 -->
    <div class="admin-pane" id="pane-analytics">
      <div class="panel"><div class="panel-title" id="t_an_title">埋点统计</div>
        <div class="panel-body">
          <div class="btn-row" style="margin-top:0;align-items:center;gap:10px">
            <label style="font-size:12px;color:var(--text-dim)" id="t_an_range">时间范围</label>
            <select id="anRange" style="width:auto"><option value="1">1d</option><option value="7" selected>7d</option><option value="30">30d</option><option value="90">90d</option></select>
            <button class="btn small" id="reloadAn">↻</button>
          </div>
          <div id="t_an_bypage" style="margin:14px 0 6px;color:var(--accent);font-size:12px;letter-spacing:1px">各页面</div>
          <div style="overflow-x:auto"><table class="data-table" id="pageTable"><thead><tr id="pageHead"></tr></thead><tbody></tbody></table></div>
          <div id="t_an_topclicks" style="margin:16px 0 6px;color:var(--accent);font-size:12px;letter-spacing:1px">热门点击 Top 20</div>
          <div style="overflow-x:auto"><table class="data-table" id="clickTable"><thead><tr id="clickHead"></tr></thead><tbody></tbody></table></div>
          <div id="t_an_daily" style="margin:16px 0 6px;color:var(--accent);font-size:12px;letter-spacing:1px">每日趋势</div>
          <div id="dailyBox" style="font-size:12px;color:var(--text-dim)"></div>
        </div>
      </div>
    </div>

    <!-- 设置 -->
    <div class="admin-pane" id="pane-settings">
      <div class="panel"><div class="panel-title" id="t_set_title">站点设置</div>
        <div class="panel-body">
          <div class="field"><label id="t_set_note">邀请码弹窗底部说明</label></div>
          <div class="form-grid" style="max-width:820px">
            <div class="field"><label id="t_set_zh">中文</label><textarea id="set_zh" rows="3" style="width:100%"></textarea></div>
            <div class="field"><label id="t_set_en">English</label><textarea id="set_en" rows="3" style="width:100%"></textarea></div>
          </div>
          <div class="btn-row"><button class="btn" id="saveSettings" data-def="1">保存</button></div>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="adminMsg"></div>

<script src="js/lib/config.js?v=228"></script>
<script src="js/lib/i18n.js?v=228"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/lib/shell.js?v=228"></script>
<script src="js/lib/api.js?v=228"></script>
<script>
const $ = id => document.getElementById(id);
const lang = (window.I18N && I18N.lang() === 'zh') ? 'zh' : 'en';
/* 后台文案本地化（不进全站 i18n，避免膨胀共享字典） */
const L = {
  forbidden: { zh: '⛔ 仅管理员可访问本页面。', en: '⛔ Admins only.' },
  tab_users: { zh: '用户', en: 'Users' }, tab_create: { zh: '建号', en: 'Create' }, tab_analytics: { zh: '埋点', en: 'Analytics' }, tab_settings: { zh: '设置', en: 'Settings' },
  t_users_title: { zh: '用户管理', en: 'User Management' }, t_refresh: { zh: '刷新', en: 'Refresh' },
  col_email: { zh: '邮箱', en: 'Email' }, col_credits: { zh: '积分', en: 'Credits' }, col_invites: { zh: '邀请(已用/总)', en: 'Invites(used/total)' }, col_created: { zh: '注册于', en: 'Created' }, col_credit_op: { zh: '改积分', en: 'Adjust credits' }, col_invite_op: { zh: '补发码', en: 'Issue codes' },
  reason_ph: { zh: '原因(选填)', en: 'reason(opt)' }, apply: { zh: '应用', en: 'Apply' }, issue: { zh: '发', en: 'Issue' },
  t_create_title: { zh: '新增账号', en: 'Create Account' }, t_c_email: { zh: '邮箱', en: 'Email' }, t_c_pwd: { zh: '密码（≥6）', en: 'Password (≥6)' }, t_c_credits: { zh: '初始积分', en: 'Initial credits' }, t_c_invites: { zh: '邀请码数', en: 'Invite codes' }, create_btn: { zh: '创建账号', en: 'Create account' },
  t_an_title: { zh: '埋点统计', en: 'Analytics' }, t_an_range: { zh: '时间范围', en: 'Range' }, t_an_bypage: { zh: '各页面', en: 'By page' }, t_an_topclicks: { zh: '热门点击 Top 20', en: 'Top clicks (20)' }, t_an_daily: { zh: '每日趋势', en: 'Daily trend' },
  an_page: { zh: '页面', en: 'Page' }, an_views: { zh: '浏览', en: 'Views' }, an_dwell: { zh: '均停留(s)', en: 'Avg dwell(s)' }, an_clicks: { zh: '点击', en: 'Clicks' }, an_target: { zh: '元素', en: 'Target' }, an_n: { zh: '次数', en: 'Count' }, an_none: { zh: '暂无数据（埋点上线后逐步积累）', en: 'No data yet (accumulates after tracking goes live)' },
  t_set_title: { zh: '站点设置', en: 'Site Settings' }, t_set_note: { zh: '邀请码弹窗底部说明', en: 'Invite modal footer note' }, t_set_zh: { zh: '中文', en: 'Chinese' }, t_set_en: { zh: 'English', en: 'English' }, save: { zh: '保存', en: 'Save' },
  saved: { zh: '已保存', en: 'Saved' }, created_ok: { zh: '账号已创建', en: 'Account created' }, loading: { zh: '加载中…', en: 'Loading…' }, working: { zh: '处理中…', en: 'Working…' },
};
const t = k => (L[k] && L[k][lang]) || k;

let msgTimer = null;
function toast(m, ok = true) {
  const el = $('adminMsg'); el.textContent = m; el.style.borderColor = ok ? 'var(--accent)' : 'var(--hot)'; el.style.display = '';
  clearTimeout(msgTimer); msgTimer = setTimeout(() => el.style.display = 'none', 2600);
}
/* 后台调用（双路径）：
 * 路径A（首选）：同源 /api/fn/admin-api —— 页面所在服务器转发，同源无 CORS 预检，
 *   绕开浏览器直连 supabase.co 的网络/CORS 问题（Authorization 携带管理员 JWT 透传）。
 * 路径B（回退）：直连 Edge Function（本地静态预览 / 后端未升级时用）。 */
async function adminViaProxy(body, token) {
  const r = await fetch('api/fn/admin-api', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', ...(token ? { Authorization: 'Bearer ' + token } : {}) },
    body: JSON.stringify(body),
  });
  if (r.status === 404 || r.status === 501 || r.status === 502 || r.status === 504) throw new Error('proxy-unavailable');
  let j; try { j = await r.json(); } catch (_) { throw new Error('proxy-unavailable'); }
  return j;
}
async function adminApi(action, extra = {}) {
  const body = { action, ...extra };
  let token = null;
  try { const s = await window.sbClient.auth.getSession(); token = s.data && s.data.session && s.data.session.access_token; } catch (_) {}
  // 路径A：同源代理
  try {
    const j = await adminViaProxy(body, token);
    if (j && j.error) throw new Error(j.error);
    return j;
  } catch (e) {
    const m = String(e && e.message);
    if (m !== 'proxy-unavailable' && !(e instanceof TypeError)) throw e;   // 业务/权限错误直接上抛
  }
  // 路径B：直连 Edge Function
  const { data, error } = await window.sbClient.functions.invoke('admin-api', { body });
  if (error) {
    let msg = error.message || 'error';
    try { const j = await error.context.json(); if (j && j.error) msg = j.error; } catch (_) {}
    throw new Error(msg);
  }
  if (data && data.error) throw new Error(data.error);
  return data;
}
const esc = s => String(s ?? '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const fdate = s => s ? new Date(s).toLocaleDateString() : '—';

/* ---------- 守卫 ---------- */
function boot(isAdmin) {
  if (!isAdmin) { $('adminGuard').style.display = ''; $('guardMsg').textContent = t('forbidden'); $('adminMain').style.display = 'none'; return; }
  $('adminMain').style.display = '';
  applyLabels(); renderTabs(); loadUsers();
}
window.addEventListener('hvac-auth-ready', e => boot(!!(e.detail && e.detail.isAdmin)));
// 若事件已先于监听触发
if (window.HVAC_IS_ADMIN !== undefined) boot(window.HVAC_IS_ADMIN === true);

function applyLabels() {
  ['t_users_title','t_refresh','t_create_title','t_c_email','t_c_pwd','t_c_credits','t_c_invites','t_an_title','t_an_range','t_an_bypage','t_an_topclicks','t_an_daily','t_set_title','t_set_note','t_set_zh','t_set_en'].forEach(id => { const el = $(id); if (el) el.textContent = t(id); });
  $('createBtn').textContent = t('create_btn'); $('saveSettings').textContent = t('save');
}

/* ---------- Tabs ---------- */
const TABS = [['users', 'tab_users'], ['create', 'tab_create'], ['analytics', 'tab_analytics'], ['settings', 'tab_settings']];
function renderTabs() {
  $('adminTabs').innerHTML = TABS.map(([k, lk], i) => `<button data-k="${k}"${i === 0 ? ' class="on"' : ''}>${t(lk)}</button>`).join('');
  $('adminTabs').querySelectorAll('button').forEach(b => b.onclick = () => {
    $('adminTabs').querySelectorAll('button').forEach(x => x.classList.toggle('on', x === b));
    document.querySelectorAll('.admin-pane').forEach(p => p.classList.toggle('on', p.id === 'pane-' + b.dataset.k));
    if (b.dataset.k === 'analytics') loadAnalytics();
    if (b.dataset.k === 'settings') loadSettings();
  });
}

/* ---------- 用户 ---------- */
async function loadUsers() {
  $('usersHead').innerHTML = `<th>${t('col_email')}</th><th>${t('col_credits')}</th><th>${t('col_invites')}</th><th>${t('col_created')}</th><th>${t('col_credit_op')}</th><th>${t('col_invite_op')}</th>`;
  const tb = $('usersTable').querySelector('tbody');
  tb.innerHTML = `<tr><td colspan="6" style="color:var(--text-dim)">${t('loading')}</td></tr>`;
  try {
    const r = await adminApi('list_users');
    const users = r.users || [];
    tb.innerHTML = users.map(u => `<tr data-uid="${u.id}">
      <td style="text-align:left">${esc(u.email)}</td>
      <td class="c-credits">${u.credits}</td>
      <td>${u.invites_used}/${u.invites_total}</td>
      <td>${fdate(u.created_at)}</td>
      <td><div class="admin-cell-inline"><input type="number" class="d-delta" placeholder="±"><input type="text" class="d-reason" placeholder="${t('reason_ph')}" style="width:90px"><button class="btn mini d-apply">${t('apply')}</button></div></td>
      <td><div class="admin-cell-inline"><input type="number" class="d-n" value="5"><button class="btn mini d-issue">${t('issue')}</button></div></td>
    </tr>`).join('') || `<tr><td colspan="6" style="color:var(--text-dim)">—</td></tr>`;
    tb.querySelectorAll('tr[data-uid]').forEach(tr => {
      const uid = tr.dataset.uid;
      tr.querySelector('.d-apply')?.addEventListener('click', async () => {
        const delta = parseInt(tr.querySelector('.d-delta').value, 10);
        if (!Number.isInteger(delta) || delta === 0) return toast('delta?', false);
        try { const rr = await adminApi('adjust_credits', { user_id: uid, delta, reason: tr.querySelector('.d-reason').value || 'admin_adjust' }); tr.querySelector('.c-credits').textContent = rr.balance; tr.querySelector('.d-delta').value = ''; toast('✓ ' + rr.balance); } catch (e) { toast(e.message, false); }
      });
      tr.querySelector('.d-issue')?.addEventListener('click', async () => {
        const n = parseInt(tr.querySelector('.d-n').value, 10) || 5;
        try { const rr = await adminApi('issue_invites', { user_id: uid, n }); toast('✓ +' + (rr.codes || []).length); loadUsers(); } catch (e) { toast(e.message, false); }
      });
    });
  } catch (e) { tb.innerHTML = `<tr><td colspan="6" style="color:var(--hot)">${esc(e.message)}</td></tr>`; }
}
$('reloadUsers').onclick = loadUsers;

/* ---------- 建号 ---------- */
$('createBtn').onclick = async () => {
  const email = $('c_email').value.trim(), password = $('c_pwd').value;
  const credits = parseInt($('c_credits').value, 10), invites = parseInt($('c_invites').value, 10);
  if (!email || !password) return toast('email/password?', false);
  $('createBtn').disabled = true; $('createBtn').textContent = t('working');
  try {
    const r = await adminApi('create_user', { email, password, credits: Number.isInteger(credits) ? credits : 1000, invites: Number.isInteger(invites) ? invites : 5 });
    $('createOut').innerHTML = `<div class="kv"><div class="k">${t('created_ok')}</div><div class="v" style="font-size:12px">${esc(email)}<br>${(r.codes || []).map(esc).join(' · ')}</div></div>`;
    $('c_email').value = ''; $('c_pwd').value = ''; toast('✓ ' + t('created_ok'));
  } catch (e) { toast(e.message, false); }
  $('createBtn').disabled = false; $('createBtn').textContent = t('create_btn');
};

/* ---------- 埋点 ---------- */
async function loadAnalytics() {
  const days = parseInt($('anRange').value, 10) || 7;
  $('pageHead').innerHTML = `<th>${t('an_page')}</th><th>${t('an_views')}</th><th>${t('an_dwell')}</th><th>${t('an_clicks')}</th>`;
  $('clickHead').innerHTML = `<th>${t('an_page')}</th><th>${t('an_target')}</th><th>${t('an_n')}</th>`;
  const pt = $('pageTable').querySelector('tbody'), ct = $('clickTable').querySelector('tbody');
  pt.innerHTML = `<tr><td colspan="4" style="color:var(--text-dim)">${t('loading')}</td></tr>`; ct.innerHTML = '';
  try {
    const r = await adminApi('get_analytics', { days });
    const a = r.analytics || {};
    const bp = a.by_page || [];
    pt.innerHTML = bp.length ? bp.map(x => `<tr><td style="text-align:left">${esc(x.page)}</td><td>${x.views || 0}</td><td>${x.avg_dwell_s ?? '—'}</td><td>${x.clicks || 0}</td></tr>`).join('') : `<tr><td colspan="4" style="color:var(--text-dim)">${t('an_none')}</td></tr>`;
    const tc = a.top_clicks || [];
    ct.innerHTML = tc.length ? tc.map(y => `<tr><td style="text-align:left">${esc(y.page)}</td><td style="text-align:left">${esc(y.target)}</td><td>${y.n}</td></tr>`).join('') : `<tr><td colspan="3" style="color:var(--text-dim)">${t('an_none')}</td></tr>`;
    const dl = a.daily || [];
    const max = Math.max(1, ...dl.map(d => d.views || 0));
    $('dailyBox').innerHTML = dl.length ? dl.map(d => `<div style="display:flex;align-items:center;gap:8px;margin:2px 0"><span style="width:92px">${d.d}</span><span style="display:inline-block;height:10px;background:var(--accent);border-radius:2px;width:${Math.round((d.views || 0) / max * 220)}px"></span><span>${d.views || 0}</span></div>`).join('') : t('an_none');
  } catch (e) { pt.innerHTML = `<tr><td colspan="4" style="color:var(--hot)">${esc(e.message)}</td></tr>`; }
}
$('reloadAn').onclick = loadAnalytics; $('anRange').onchange = loadAnalytics;

/* ---------- 设置 ---------- */
async function loadSettings() {
  try {
    const r = await adminApi('get_settings');
    const note = (r.settings || []).find(s => s.key === 'invite_note') || {};
    $('set_zh').value = note.val_zh || ''; $('set_en').value = note.val_en || '';
  } catch (e) { toast(e.message, false); }
}
$('saveSettings').onclick = async () => {
  $('saveSettings').disabled = true;
  try { await adminApi('update_settings', { key: 'invite_note', val_zh: $('set_zh').value, val_en: $('set_en').value }); toast('✓ ' + t('saved')); }
  catch (e) { toast(e.message, false); }
  $('saveSettings').disabled = false;
};
</script>
</body>
</html>
