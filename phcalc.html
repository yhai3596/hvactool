<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title data-i18n="pc_pagetitle">压焓在线计算 · HVAC 工具站</title>
<link rel="stylesheet" href="css/style.css?v=217">
<link rel="stylesheet" href="css/site.css?v=217">
</head>
<body data-page="phcalc" data-units="1" class="tool-page">
<div id="app">
  <div class="tool-layout">
    <div>
      <div class="panel">
        <div class="panel-title" data-i18n="pc_input">循环工况输入 · CYCLE INPUT</div>
        <div class="panel-body">
          <div class="form-grid">
            <div class="field"><label data-i18n="pc_f_fluid">冷媒</label><select id="fluid"></select></div>
            <div class="field"><label data-i18n="pc_f_mode">输入方式</label>
              <select id="byMode"><option value="P" data-i18n="pc_opt_p">蒸发 / 冷凝压力</option><option value="T" data-i18n="pc_opt_t">蒸发 / 冷凝温度</option></select>
            </div>
            <div class="field"><label id="lblPe"><span data-i18n="pc_lbl_pe">蒸发压力，绝对</span>（<span data-ul="press"></span>）</label><input id="pe" data-uk="press" type="number" step="any" value="1085"></div>
            <div class="field"><label id="lblPc"><span data-i18n="pc_lbl_pc">冷凝压力，绝对</span>（<span data-ul="press"></span>）</label><input id="pc" data-uk="press" type="number" step="any" value="2735"></div>
            <div class="field"><label><span data-i18n="pc_f_sh">吸气过热度</span>（<span data-ul="dtemp"></span>）</label><input id="sh" data-uk="dtemp" type="number" step="any" value="5"></div>
            <div class="field"><label><span data-i18n="pc_f_sc">过冷度</span>（<span data-ul="dtemp"></span>）</label><input id="sc" data-uk="dtemp" type="number" step="any" value="5"></div>
            <div class="field"><label data-i18n="pc_f_eff">压缩等熵效率</label><input id="eff" type="number" step="0.01" min="0.3" max="1" value="0.70"></div>
            <div class="field"><label><span data-i18n="pc_f_mdot">质量流量</span>（<span data-ul="mflow"></span>，<span data-i18n="pc_f_opt">选填</span>）</label><input id="mdot" data-uk="mflow" type="number" step="any" data-i18n-ph="pc_mdot_ph" placeholder="填写后给出能力"></div>
          </div>
          <div class="btn-row"><button class="btn" id="calcBtn" data-i18n="pc_calc">计 算</button></div>
          <div class="note" data-i18n-html="pc_note">按理论单级蒸气压缩循环：1 吸气 → 2 排气（等熵效率修正）→ 3 冷凝出口 → 4 节流。混合冷媒蒸发温度按露点、冷凝温度按泡点。<br>
          <b>图上交互</b>：直接拖动压焓图中的状态点 —— 拖 <b>点1/点4</b> 上下改蒸发压力、拖 <b>点2/点3</b> 上下改冷凝压力；拖 <b>点1</b> 左右改过热度、拖 <b>点3</b> 左右改过冷度，松手自动精算。</div>
        </div>
      </div>

      <div class="panel" style="margin-top:10px">
        <div class="panel-title" data-i18n="pc_result">计算结果 · RESULT</div>
        <div class="panel-body">
          <div class="kv-grid" id="resGrid"></div>
          <div style="overflow-x:auto;margin-top:12px">
            <table class="data-table" id="ptTable" style="display:none">
              <thead><tr><th data-i18n="pc_th_state">状态点</th><th id="thT">T</th><th id="thP">P</th><th id="thH">h</th><th data-i18n="pc_th_note">备注</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title"><span data-i18n="pc_chart">压焓图（可拖拽） · INTERACTIVE P-h</span> <span id="phTag" style="color:#a78bfa;font-family:Consolas"></span></div>
      <canvas id="phCv" width="560" height="620" style="width:100%;display:block;cursor:crosshair"></canvas>
    </div>
  </div>
</div>

<script src="js/lib/config.js?v=217"></script>
<script src="js/lib/i18n.js?v=217"></script>
<script src="js/lib/units.js?v=217"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/lib/shell.js?v=217"></script>
<script src="js/lib/analytics.js?v=217"></script>
<script src="js/lib/api.js?v=217"></script>
<script>
const $ = id => document.getElementById(id);
const FLUIDS = ['R410A','R32','R454B','R134a','R290','R404A','R407C','R22','R1234yf','R600a','R717','R744'];
$('fluid').innerHTML = FLUIDS.map(f => `<option>${f}</option>`).join('');

/* 当前工况（内部一律 SI: kPa / K） */
let cur = { pe: 1085, pc: 2735, sh: 5, sc: 5 };
let dome = null, lastRes = null;
let cpv = 1.1, cpl = 1.6, wEst = 35;

$('byMode').onchange = () => {
  const byT = $('byMode').value === 'T';
  const uP = byT ? 'temp' : 'press';
  $('lblPe').innerHTML = `<span>${window.T(byT ? 'pc_lbl_te' : 'pc_lbl_pe')}</span>（<span data-ul="${uP}"></span>）`;
  $('lblPc').innerHTML = `<span>${window.T(byT ? 'pc_lbl_tc' : 'pc_lbl_pc')}</span>（<span data-ul="${uP}"></span>）`;
  $('pe').dataset.uk = byT ? 'temp' : 'press';
  $('pc').dataset.uk = byT ? 'temp' : 'press';
  $('pe').value = Units.nice(byT ? cvIn('temp', 10) : cvIn('press', 1085));
  $('pc').value = Units.nice(byT ? cvIn('temp', 45) : cvIn('press', 2735));
  Units.relabel();
};
/* SI → 当前输入单位（用于程序回填输入框） */
function cvIn(kind, siv) {
  if (Units.sysIn === 'si') return siv;
  const K = { temp: v => v * 1.8 + 32, press: v => v * 0.1450377377, dtemp: v => v * 1.8, mflow: v => v * 7.936641439 };
  return K[kind] ? K[kind](siv) : siv;
}

function readInputsToCur() {
  const byT = $('byMode').value === 'T';
  if (byT) {
    cur._te = Units.toSI('temp', parseFloat($('pe').value));
    cur._tc = Units.toSI('temp', parseFloat($('pc').value));
    cur.pe = null;   // 由温度经 API 换算
  } else {
    cur.pe = Units.toSI('press', parseFloat($('pe').value));
    cur.pc = Units.toSI('press', parseFloat($('pc').value));
  }
  cur.sh = Units.toSI('dtemp', parseFloat($('sh').value) || 0);
  cur.sc = Units.toSI('dtemp', parseFloat($('sc').value) || 0);
}

function writeCurToInputs() {
  if ($('byMode').value === 'T') $('byMode').value = 'P', $('byMode').onchange();
  $('pe').value = Units.nice(cvIn('press', cur.pe));
  $('pc').value = Units.nice(cvIn('press', cur.pc));
  $('sh').value = Units.nice(Units.sysIn === 'ip' ? cur.sh * 1.8 : cur.sh);
  $('sc').value = Units.nice(Units.sysIn === 'ip' ? cur.sc * 1.8 : cur.sc);
}

const kv = (k, v, u, cls) => `<div class="kv ${cls||''}"><div class="k">${k}</div><div class="v">${v}<small>${u||''}</small></div></div>`;
const V = (kind, siv, d = 2) => fmtN(Units.val(kind, siv), d);

async function doCalc(fromDrag) {
  try {
    const fluid = $('fluid').value;
    if (!fromDrag) {
      readInputsToCur();
      if (cur.pe === null) {   // 温度输入 → 压力
        const e = await api('/api/sat', { fluid, by: 'T', value: cur._te });
        const c = await api('/api/sat', { fluid, by: 'T', value: cur._tc });
        cur.pe = e.p_dew; cur.pc = c.p_bubble;
      }
    }
    const params = { fluid, pe: cur.pe, pc: cur.pc, sh: cur.sh, sc: cur.sc, eff: $('eff').value };
    const mdot = Units.toSI('mflow', parseFloat($('mdot').value));
    if (mdot > 0) params.mdot = mdot;
    const j = await api('/api/phcycle', params);
    if (!dome || dome.fluid !== fluid) dome = await api('/api/dome', { fluid });
    lastRes = j;
    // 更新拖拽用估计参数
    const hgE = interp(dome.p, dome.hg, cur.pe), hfC = interp(dome.p, dome.hf, cur.pc);
    if (cur.sh > 0.5) cpv = Math.max((j.points['1'].h - hgE) / cur.sh, 0.4);
    if (cur.sc > 0.5) cpl = Math.max((hfC - j.points['3'].h) / cur.sc, 0.6);
    wEst = j.w;
    renderResults();
    draw();
  } catch (e) { if (!fromDrag) toast(e.message, true); }
}
$('calcBtn').onclick = () => doCalc(false);

function renderResults() {
  if (!lastRes) return;
  const j = lastRes;
  const T = window.T;
  $('resGrid').innerHTML =
    kv(T('pc_r_tevap'), V('temp', j.t_evap_dew), Units.u('temp')) +
    kv(T('pc_r_tcond'), V('temp', j.t_cond_bubble), Units.u('temp')) +
    kv(T('pc_r_qe'), V('h', j.qe), Units.u('h'), 'hl') +
    kv(T('pc_r_qc'), V('h', j.qc), Units.u('h')) +
    kv(T('pc_r_w'), V('h', j.w), Units.u('h')) +
    kv(T('pc_r_copc'), fmtN(j.cop_c, 2), '', 'hl') +
    kv(T('pc_r_coph'), fmtN(j.cop_h, 2)) +
    kv(T('pc_r_pr'), fmtN(j.pr, 2)) +
    kv(T('pc_r_td'), V('temp', j.points['2'].T, 1), Units.u('temp'), j.points['2'].T > 110 ? 'warn' : '') +
    kv(T('pc_r_rho'), V('rho', j.rho_suction), Units.u('rho')) +
    kv(T('pc_r_volcap'), V('volcap', j.vol_capacity, 0), Units.u('volcap')) +
    (j.Qe_kW !== undefined
      ? kv(T('pc_r_capc'), V('power', j.Qe_kW, Units.sysOut === 'ip' ? 0 : 2), Units.u('power'), 'hl') +
        kv(T('pc_r_caph'), V('power', j.Qc_kW, Units.sysOut === 'ip' ? 0 : 2), Units.u('power')) +
        kv(T('pc_r_wpower'), V('power', j.W_kW, Units.sysOut === 'ip' ? 0 : 2), Units.u('power'))
      : '');
  $('thT').textContent = 'T ' + Units.u('temp');
  $('thP').textContent = 'P ' + Units.u('press');
  $('thH').textContent = 'h ' + Units.u('h');
  const P = j.points;
  const rows = [
    [`1 ${T('pc_pt1')}`, P['1'], `${T('pc_n_sh')} ${fmtN(Units.val('dtemp', cur.sh),1)} ${Units.u('dtemp')}`],
    [`2s ${T('pc_pt2s')}`, P['2s'], T('pc_n_ideal')],
    [`2 ${T('pc_pt2')}`, P['2'], `η=${$('eff').value}`],
    [`3 ${T('pc_pt3')}`, P['3'], `${T('pc_n_sc')} ${fmtN(Units.val('dtemp', cur.sc),1)} ${Units.u('dtemp')}`],
    [`4 ${T('pc_pt4')}`, P['4'], P['4'].x != null ? `${T('pc_n_x')}${fmtN(P['4'].x,3)}` : ''],
  ];
  $('ptTable').querySelector('tbody').innerHTML = rows.map(([n, p, note]) =>
    `<tr><td>${n}</td><td>${V('temp', p.T)}</td><td>${V('press', p.P, 1)}</td><td>${V('h', p.h)}</td><td style="text-align:left;color:var(--text-dim)">${note}</td></tr>`).join('');
  $('ptTable').style.display = '';
}

/* ================= 交互压焓图 ================= */
const cv = $('phCv'), ctx = cv.getContext('2d');
const MG = { l: 54, r: 16, t: 14, b: 36 };
const CV_DW = 560, CV_DH = 620;
let LW = CV_DW, LH = CV_DH;
/* hi-DPI 背板：显示尺寸 × dpr，逻辑坐标不变（消除模糊） */
function prepCanvas() {
  const dpr = Math.min(Math.max(window.devicePixelRatio || 1, 1), 2.5);
  const r = cv.getBoundingClientRect();
  LW = Math.round(r.width) || CV_DW;
  LH = Math.round(LW * CV_DH / CV_DW);
  const bw = Math.round(LW * dpr), bh = Math.round(LH * dpr);
  if (cv.width !== bw || cv.height !== bh) { cv.width = bw; cv.height = bh; cv.style.height = LH + 'px'; }
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
let XY = null;        // 坐标映射
let handles = {};     // 屏幕坐标手柄
let dragging = null, hover = null, mousePos = null;
let debTimer = null;

function interp(xs, ys, x) {
  if (x <= xs[0]) return ys[0];
  for (let i = 1; i < xs.length; i++) {
    if (x <= xs[i]) {
      const k = (x - xs[i-1]) / (xs[i] - xs[i-1]);
      return ys[i-1] + (ys[i] - ys[i-1]) * k;
    }
  }
  return ys[ys.length - 1];
}

/* 拖拽期间的近似循环点 */
function approxPoints() {
  const hg = interp(dome.p, dome.hg, cur.pe);
  const hf = interp(dome.p, dome.hf, cur.pc);
  const h1 = hg + cpv * cur.sh;
  const h3 = hf - cpl * cur.sc;
  const base = lastRes ? Math.log(lastRes.pr) : Math.log(2.5);
  const w = wEst * Math.log(cur.pc / cur.pe) / Math.max(base, 0.2);
  return { '1': { h: h1, P: cur.pe }, '2': { h: h1 + w, P: cur.pc }, '3': { h: h3, P: cur.pc }, '4': { h: h3, P: cur.pe } };
}

function draw(approx) {
  if (!dome) return;
  $('phTag').textContent = dome.fluid;
  prepCanvas();
  const W = LW, H = LH;
  ctx.clearRect(0, 0, W, H);
  const pts = approx || (lastRes ? lastRes.points : approxPoints());

  const allH = dome.hf.concat(dome.hg, Object.values(pts).map(p => p.h));
  const hMin = Math.min(...allH) - 20, hMax = Math.max(...allH) + 40;
  const pMin = Math.max(Math.min(...dome.p, pts['1'].P) * 0.6, 20);
  const pMax = dome.p_crit * 1.15;
  const X = h => MG.l + (h - hMin) / (hMax - hMin) * (W - MG.l - MG.r);
  const Y = p => H - MG.b - (Math.log10(p) - Math.log10(pMin)) / (Math.log10(pMax) - Math.log10(pMin)) * (H - MG.t - MG.b);
  const Xi = px => hMin + (px - MG.l) / (W - MG.l - MG.r) * (hMax - hMin);
  const Yi = py => Math.pow(10, Math.log10(pMin) + (H - MG.b - py) / (H - MG.t - MG.b) * (Math.log10(pMax) - Math.log10(pMin)));
  XY = { X, Y, Xi, Yi };

  const cGrid = cssv('--tbl-line') || 'rgba(120,180,220,.16)';
  const cTxt = cssv('--text-dim') || '#9fc0dc';
  const cDome = cssv('--accent') || '#22d3ee';
  const cCycle = cssv('--warn') || '#fbbf24';

  ctx.font = '11px Consolas';
  for (const p of [50, 100, 200, 500, 1000, 2000, 5000]) {
    if (p < pMin || p > pMax) continue;
    ctx.strokeStyle = cGrid;
    ctx.beginPath(); ctx.moveTo(MG.l, Y(p)); ctx.lineTo(W - MG.r, Y(p)); ctx.stroke();
    ctx.fillStyle = cTxt; ctx.textAlign = 'right';
    const lbl = Units.sysOut === 'ip' ? fmtN(p * 0.1450377, 0) : (p >= 1000 ? (p/1000)+'M' : p+'k');
    ctx.fillText(lbl, MG.l - 4, Y(p) + 3);
  }
  for (let h = Math.ceil(hMin/50)*50; h < hMax; h += 50) {
    ctx.strokeStyle = cGrid;
    ctx.beginPath(); ctx.moveTo(X(h), MG.t); ctx.lineTo(X(h), H - MG.b); ctx.stroke();
    ctx.fillStyle = cTxt; ctx.textAlign = 'center';
    ctx.fillText(Units.sysOut === 'ip' ? fmtN(h * 0.4299226, 0) : h, X(h), H - MG.b + 13);
  }
  ctx.fillStyle = cssv('--text-dim'); ctx.textAlign = 'center';
  ctx.fillText(`${window.T('ph_h')} ${Units.u('h')} (IIR)`, (MG.l+W-MG.r)/2, H - 8);
  ctx.save(); ctx.translate(12, H/2); ctx.rotate(-Math.PI/2);
  ctx.fillText(`${window.T('ph_p')} ${Units.u('press')} (log)`, 0, 0); ctx.restore();

  // 穹顶
  ctx.beginPath();
  dome.p.forEach((p, i) => i ? ctx.lineTo(X(dome.hf[i]), Y(p)) : ctx.moveTo(X(dome.hf[i]), Y(p)));
  for (let i = dome.p.length - 1; i >= 0; i--) ctx.lineTo(X(dome.hg[i]), Y(dome.p[i]));
  ctx.strokeStyle = cDome; ctx.lineWidth = 2.4;
  ctx.shadowColor = cDome; ctx.shadowBlur = 3; ctx.stroke(); ctx.shadowBlur = 0;

  // 循环
  ctx.beginPath();
  ctx.moveTo(X(pts['1'].h), Y(pts['1'].P));
  ctx.lineTo(X(pts['2'].h), Y(pts['2'].P));
  ctx.lineTo(X(pts['3'].h), Y(pts['3'].P));
  ctx.lineTo(X(pts['4'].h), Y(pts['4'].P));
  ctx.closePath();
  ctx.strokeStyle = cCycle; ctx.lineWidth = 2.6;
  ctx.shadowColor = cCycle; ctx.shadowBlur = 4; ctx.stroke(); ctx.shadowBlur = 0;
  if (!approx && lastRes && lastRes.points['2s']) {
    ctx.setLineDash([4, 4]);
    ctx.beginPath(); ctx.moveTo(X(pts['1'].h), Y(pts['1'].P)); ctx.lineTo(X(lastRes.points['2s'].h), Y(lastRes.points['2s'].P));
    ctx.strokeStyle = cCycle; ctx.globalAlpha = .45; ctx.lineWidth = 1.2; ctx.stroke();
    ctx.globalAlpha = 1; ctx.setLineDash([]);
  }

  // 手柄
  const lbl = { '1': `1 ${window.T('pt_suction')}`, '2': `2 ${window.T('pt_discharge')}`, '3': `3 ${window.T('pt_condout')}`, '4': `4 ${window.T('pt_evapin')}` };
  handles = {};
  for (const k of ['1', '2', '3', '4']) {
    const p = pts[k];
    const hx = X(p.h), hy = Y(p.P);
    handles[k] = { x: hx, y: hy };
    const active = dragging === k || hover === k;
    ctx.fillStyle = active ? cCycle : (cssv('--text') || '#fff');
    ctx.beginPath(); ctx.arc(hx, hy, active ? 5 : 3.4, 0, 7); ctx.fill();
    ctx.strokeStyle = cCycle; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.arc(hx, hy, active ? 9 : 6, 0, 7); ctx.stroke();
    ctx.textAlign = 'left'; ctx.font = 'bold 12px Consolas';
    const dx = (k === '3' || k === '4') ? -58 : 10;
    const ty = hy + (k === '1' ? 16 : -10);
    ctx.lineWidth = 3.2; ctx.strokeStyle = cssv('--panel') || 'rgba(5,10,20,.85)';
    ctx.strokeText(lbl[k], hx + dx, ty);
    ctx.fillStyle = cCycle;
    ctx.fillText(lbl[k], hx + dx, ty);
  }

  // 悬停坐标
  if (mousePos && !dragging) {
    const h = Xi(mousePos.x), p = Yi(mousePos.y);
    if (h > hMin && p > pMin && p < pMax) {
      const tdew = interp(dome.p, dome.t, p);
      ctx.fillStyle = cssv('--panel'); ctx.strokeStyle = cssv('--panel-border');
      const bx = Math.min(mousePos.x + 12, W - 168), by = Math.max(mousePos.y - 44, 6);
      ctx.beginPath(); ctx.roundRect(bx, by, 160, 40, 5); ctx.fill(); ctx.stroke();
      ctx.fillStyle = cssv('--num'); ctx.textAlign = 'left'; ctx.font = '10px Consolas';
      ctx.fillText(`h ${V('h', h)} ${Units.u('h')}  P ${V('press', p, 0)} ${Units.u('press')}`, bx + 8, by + 15);
      ctx.fillText(`${window.T('pc_tsat')} ${V('temp', tdew, 1)} ${Units.u('temp')}`, bx + 8, by + 30);
    }
  }
}

function pos(ev) {
  const r = cv.getBoundingClientRect();
  return { x: (ev.clientX - r.left) * LW / r.width, y: (ev.clientY - r.top) * LH / r.height };
}
function hitHandle(p) {
  for (const k in handles) {
    if (Math.hypot(handles[k].x - p.x, handles[k].y - p.y) < 14) return k;
  }
  return null;
}

cv.addEventListener('mousedown', ev => {
  const p = pos(ev);
  dragging = hitHandle(p);
  if (dragging) ev.preventDefault();
});

cv.addEventListener('mousemove', ev => {
  const p = pos(ev);
  mousePos = p;
  if (!XY || !dome) return;
  if (!dragging) {
    hover = hitHandle(p);
    cv.style.cursor = hover ? 'grab' : 'crosshair';
    draw();
    return;
  }
  cv.style.cursor = 'grabbing';
  const P = Math.max(XY.Yi(p.y), 25);
  const h = XY.Xi(p.x);
  const pcrit = dome.p_crit;
  if (dragging === '1') {
    cur.pe = Math.min(Math.max(P, dome.p[0]), cur.pc * 0.8);
    cur.sh = Math.min(Math.max((h - interp(dome.p, dome.hg, cur.pe)) / cpv, 0), 50);
  } else if (dragging === '4') {
    cur.pe = Math.min(Math.max(P, dome.p[0]), cur.pc * 0.8);
  } else if (dragging === '2') {
    cur.pc = Math.min(Math.max(P, cur.pe * 1.25), pcrit * 0.97);
  } else if (dragging === '3') {
    cur.pc = Math.min(Math.max(P, cur.pe * 1.25), pcrit * 0.97);
    cur.sc = Math.min(Math.max((interp(dome.p, dome.hf, cur.pc) - h) / cpl, 0), 30);
  }
  writeCurToInputs();
  draw(approxPoints());
  clearTimeout(debTimer);
  debTimer = setTimeout(() => doCalc(true), 260);
});

window.addEventListener('mouseup', () => {
  if (dragging) { dragging = null; cv.style.cursor = 'crosshair'; doCalc(true); }
});
cv.addEventListener('mouseleave', () => { mousePos = null; if (!dragging) draw(); });

/* 单位/主题联动 */
Units.onOut(() => { renderResults(); draw(); });
